<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pathfinding Visualizer</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f8fafc; /* nền sáng */
        --surface: #ffffff; /* panel */
        --surface2: #f1f5f9; /* input nhẹ */
        --border: #e2e8f0; /* viền */
        --text: #0f172a; /* chữ chính */
        --muted: #64748b; /* chữ phụ */

        --accent: #3b82f6; /* xanh dương chính */
        --accent-light: #dbeafe; /* nền highlight */

        --primary: #2563eb;
        --primary-light: #eff6ff;

        --success: #16a34a;
        --danger: #dc2626;

        /* terrain nhẹ, pastel */
        --wall-bg: #1f2937;

        --t1: #dcfce7; /* xanh lá nhạt */
        --t2: #fef9c3; /* vàng nhạt */
        --t3: #ffedd5; /* cam nhạt */
        --t4: #fee2e2; /* đỏ nhạt */

        --vis-visited: rgba(59, 130, 246, 0.25);
        --vis-frontier: rgba(168, 85, 247, 0.25);
        --vis-path: rgba(234, 179, 8, 0.6);
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Sora", sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      /* ── Header ── */
      header {
        background: var(--text);
        color: #fff;
        padding: 10px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.18);
        z-index: 10;
      }
      header .brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      header h1 {
        font-size: 1.05rem;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      header .pills {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .pill {
        padding: 3px 9px;
        border-radius: 20px;
        font-size: 0.62rem;
        font-weight: 600;
        background: rgba(255, 255, 255, 0.12);
        color: rgba(255, 255, 255, 0.75);
        letter-spacing: 0.04em;
      }
      .pill.active-algo {
        background: var(--accent);
        color: #fff;
      }

      /* ── Layout ── */
      .app {
        display: grid;
        grid-template-columns: 270px 1fr 230px;
        flex: 1;
        overflow: hidden;
      }
      .panel {
        background: var(--surface);
        border-right: 1px solid var(--border);
        overflow-y: auto;
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 0;
      }
      .panel-r {
        border-right: none;
        border-left: 1px solid var(--border);
      }

      /* ── Section ── */
      .sec {
        margin-bottom: 16px;
      }
      .sec-title {
        font-size: 0.58rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.09em;
        color: var(--muted);
        padding-bottom: 5px;
        margin-bottom: 8px;
        border-bottom: 1px solid var(--border);
      }
      .sep {
        height: 1px;
        background: var(--border);
        margin: 10px 0;
      }

      /* ── Inputs ── */
      label {
        display: block;
        font-size: 0.7rem;
        color: var(--muted);
        margin-bottom: 3px;
        font-weight: 500;
      }
      input[type="number"],
      select {
        width: 100%;
        padding: 6px 9px;
        border: 1.5px solid var(--border);
        border-radius: 6px;
        font-size: 0.75rem;
        font-family: "DM Mono", monospace;
        background: var(--surface2);
        color: var(--text);
        outline: none;
        margin-bottom: 7px;
        transition: border 0.15s;
      }
      input[type="number"]:focus,
      select:focus {
        border-color: var(--accent);
      }
      input[type="range"] {
        width: 100%;
        accent-color: var(--accent);
      }

      /* ── Buttons ── */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
        padding: 7px 12px;
        border-radius: 6px;
        font-size: 0.73rem;
        font-weight: 600;
        font-family: "Sora", sans-serif;
        cursor: pointer;
        border: none;
        transition: all 0.13s;
        white-space: nowrap;
      }
      .btn-primary {
        background: var(--accent);
        color: #fff;
      }
      .btn-primary:hover:not(:disabled) {
        background: #b05a20;
      }
      .btn-sec {
        background: var(--surface2);
        color: var(--text);
        border: 1.5px solid var(--border);
      }
      .btn-sec:hover:not(:disabled) {
        background: var(--border);
      }
      .btn-info {
        background: var(--primary-light);
        color: var(--primary);
        border: 1.5px solid #b8d8ee;
      }
      .btn-info:hover:not(:disabled) {
        background: #bdd8f0;
      }
      .btn:disabled {
        opacity: 0.38;
        cursor: not-allowed;
      }
      .btn-group {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
      }

      /* ── Draw modes ── */
      .draw-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 4px;
        margin-bottom: 6px;
      }
      .dm-btn {
        padding: 6px 3px;
        border-radius: 5px;
        border: 1.5px solid var(--border);
        background: var(--surface2);
        cursor: pointer;
        font-size: 0.65rem;
        font-family: "Sora", sans-serif;
        font-weight: 600;
        text-align: center;
        transition: all 0.12s;
        color: var(--text);
      }
      .dm-btn.active {
        border-color: var(--accent);
        background: var(--accent-light);
        color: var(--accent);
      }
      .dm-btn:hover:not(.active) {
        border-color: var(--muted);
      }

      /* ── Terrain cost row ── */
      .tc-row {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 5px;
      }
      .tc-swatch {
        width: 14px;
        height: 14px;
        border-radius: 3px;
        flex-shrink: 0;
        border: 1px solid rgba(0, 0, 0, 0.12);
      }
      .tc-row input {
        flex: 1;
        margin-bottom: 0;
      }
      .tc-row label {
        margin: 0;
        flex-shrink: 0;
        width: 22px;
        font-size: 0.68rem;
      }

      /* ── Center grid area ── */
      .center {
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .grid-wrap {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
        overflow: auto;
        background: var(--bg);
      }
      #grid {
        display: inline-grid;
        gap: 1.5px;
        background: var(--border);
        border: 1.5px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
        user-select: none;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
      }

      /* ── Cells ── */
      .cell {
        position: relative;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        transition: filter 0.1s;
      }
      .cell:hover {
        filter: brightness(1.08);
      }
      .cell.wall {
        background: var(--wall-bg);
      }
      .cell.t1 {
        background: var(--t1);
      }
      .cell.t2 {
        background: var(--t2);
      }
      .cell.t3 {
        background: var(--t3);
      }
      .cell.t4 {
        background: var(--t4);
      }

      /* overlay layer */
      .cell-ov {
        position: absolute;
        inset: 0;
        pointer-events: none;
        transition: background 0.15s;
      }
      .cell.vis .cell-ov {
        background: var(--vis-visited);
      }
      .cell.front .cell-ov {
        background: var(--vis-frontier);
      }
      .cell.onpath .cell-ov {
        background: var(--vis-path);
      }

      /* marker layer */
      .cell-mk {
        position: absolute;
        inset: 0;
        z-index: 3;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        pointer-events: none;
      }

      /* animations */
      @keyframes popIn {
        0% {
          transform: scale(0.2);
          opacity: 0;
        }
        65% {
          transform: scale(1.15);
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }
      @keyframes pathPop {
        0% {
          opacity: 0;
          transform: scale(0.5);
        }
        100% {
          opacity: 1;
          transform: scale(1);
        }
      }
      .cell.popping .cell-ov {
        animation: popIn 0.28s ease forwards;
      }
      .cell.pathpop .cell-ov {
        animation: pathPop 0.22s ease forwards;
      }

      /* ── Playback bar ── */
      .playbar {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 10px 14px;
        background: var(--surface);
        border-top: 1.5px solid var(--border);
        flex-shrink: 0;
      }
      .playbar .spacer {
        flex: 1;
      }

      /* ── Legend ── */
      .legend {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .leg-item {
        display: flex;
        align-items: center;
        gap: 4px;
        font-size: 0.62rem;
        color: var(--muted);
      }
      .leg-dot {
        width: 11px;
        height: 11px;
        border-radius: 2px;
      }

      /* ── Stats ── */
      .stat-card {
        background: var(--surface2);
        border-radius: 8px;
        padding: 8px 10px;
        margin-bottom: 7px;
        border: 1px solid var(--border);
      }
      .stat-lbl {
        font-size: 0.6rem;
        color: var(--muted);
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .stat-val {
        font-size: 1.45rem;
        font-weight: 700;
        font-family: "DM Mono", monospace;
        color: var(--accent);
      }
      .stat-val.sm {
        font-size: 1rem;
      }

      /* ── Log ── */
      .log {
        font-family: "DM Mono", monospace;
        font-size: 0.65rem;
        line-height: 1.55;
        color: var(--muted);
        flex: 1;
        overflow-y: auto;
        max-height: 260px;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 6px 8px;
        background: var(--surface2);
      }
      .le {
        padding: 1px 0;
        border-bottom: 1px solid rgba(0, 0, 0, 0.04);
      }
      .le.expand {
        color: var(--primary);
      }
      .le.found {
        color: var(--success);
        font-weight: 600;
      }
      .le.nofound {
        color: var(--danger);
        font-weight: 600;
      }
      .le.info {
        color: var(--accent);
        font-style: italic;
      }

      /* ── Progress ── */
      .pbar-wrap {
        margin-bottom: 5px;
      }
      .pbar-bg {
        height: 4px;
        background: var(--border);
        border-radius: 3px;
        overflow: hidden;
      }
      .pbar-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--accent), #e8a050);
        border-radius: 3px;
        transition: width 0.08s;
      }
      .pbar-lbl {
        font-size: 0.62rem;
        color: var(--muted);
        margin-top: 2px;
        font-family: "DM Mono", monospace;
      }

      /* ── Algo description ── */
      .algo-desc {
        font-size: 0.65rem;
        color: var(--muted);
        line-height: 1.5;
        background: var(--surface2);
        border-radius: 6px;
        padding: 7px 9px;
        border-left: 3px solid var(--accent);
        margin-top: 6px;
      }

      /* ── IDS depth badge ── */
      .depth-badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 12px;
        background: var(--accent-light);
        color: var(--accent);
        font-family: "DM Mono", monospace;
        font-size: 0.75rem;
        font-weight: 600;
      }

      /* ── Scrollbar ── */
      ::-webkit-scrollbar {
        width: 5px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="brand">
        <span style="font-size: 1.3rem">🗺</span>
        <div>
          <h1>Pathfinding Visualizer</h1>
          <div style="font-size: 0.6rem; opacity: 0.45; letter-spacing: 0.04em">
            Interactive Search Algorithm Explorer
          </div>
        </div>
      </div>
      <div class="pills" id="algo-pills">
        <span class="pill" data-a="BFS">BFS</span>
        <span class="pill" data-a="DFS">DFS</span>
        <span class="pill" data-a="UCS">UCS</span>
        <span class="pill" data-a="DLS">DLS</span>
        <span class="pill" data-a="IDS">IDS</span>
        <span class="pill" data-a="GBFS">GBFS</span>
        <span class="pill" data-a="Astar">A★</span>
      </div>
    </header>

    <div class="app">
      <!-- ── LEFT PANEL ── -->
      <div class="panel" id="lpanel">
        <div class="sec">
          <div class="sec-title">Grid Setup</div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 6px">
            <div>
              <label>Rows</label
              ><input type="number" id="rows" value="12" min="3" max="30" />
            </div>
            <div>
              <label>Cols</label
              ><input type="number" id="cols" value="16" min="3" max="40" />
            </div>
          </div>
          <label>Terrain Types (1–4)</label>
          <input
            type="number"
            id="tcnt"
            value="3"
            min="1"
            max="4"
            onchange="updateTerrainUI()"
          />
          <div class="btn-group">
            <button class="btn btn-primary" onclick="buildGrid()">
              ⊞ Build Grid
            </button>
            <button class="btn btn-sec" onclick="genRandom()">⚄ Random</button>
          </div>
        </div>

        <div class="sep"></div>

        <div class="sec">
          <div class="sec-title">Terrain Costs</div>
          <div id="terrain-ui"></div>
        </div>

        <div class="sep"></div>

        <div class="sec">
          <div class="sec-title">Draw Tool</div>
          <div class="draw-grid" id="draw-modes"></div>
        </div>

        <div class="sep"></div>

        <div class="sec">
          <div class="sec-title">Algorithm</div>
          <select id="algo" onchange="onAlgoChange()">
            <option value="BFS">BFS — Breadth-First Search</option>
            <option value="DFS">DFS — Depth-First Search</option>
            <option value="UCS">UCS — Uniform-Cost Search</option>
            <option value="DLS">DLS — Depth-Limited Search</option>
            <option value="IDS">IDS — Iterative Deepening</option>
            <option value="GBFS">GBFS — Greedy Best-First</option>
            <option value="Astar" selected>A★ — A-Star Search</option>
          </select>
          <div id="algo-desc" class="algo-desc"></div>

          <div id="dls-p" style="display: none; margin-top: 8px">
            <label>Depth Limit</label>
            <input type="number" id="dls-lim" value="15" min="1" max="999" />
          </div>

          <div id="h-p" style="display: none; margin-top: 8px">
            <label>Heuristic</label>
            <select id="htype">
              <option value="0">Manhattan Distance</option>
              <option value="1">Euclidean Distance</option>
            </select>
            <label>Multiplier</label>
            <input
              type="number"
              id="hmul"
              value="1.0"
              min="0.1"
              max="20"
              step="0.1"
            />
          </div>
        </div>

        <div class="sep"></div>

        <div class="sec">
          <div class="sec-title">Speed</div>
          <input type="range" id="speed" min="1" max="10" value="6" />
          <div
            style="
              display: flex;
              justify-content: space-between;
              font-size: 0.62rem;
              color: var(--muted);
            "
          >
            <span>Slow</span><span>Fast</span>
          </div>
        </div>
      </div>

      <!-- ── CENTER ── -->
      <div class="center">
        <div class="grid-wrap"><div id="grid"></div></div>

        <div class="playbar">
          <button class="btn btn-primary" id="btn-run" onclick="startRun()">
            ▶ Run
          </button>
          <button class="btn btn-sec" id="btn-step" onclick="stepRun()">
            ⏭ Step
          </button>
          <button
            class="btn btn-sec"
            id="btn-pause"
            onclick="pauseRun()"
            disabled
          >
            ⏸ Pause
          </button>
          <button class="btn btn-sec" onclick="doReset()">↩ Reset</button>
          <button class="btn btn-sec" onclick="clearVis()">✦ Clear Path</button>
          <button class="btn btn-sec" onclick="clearAll()">✕ Clear All</button>
          <div class="spacer"></div>
          <div class="legend">
            <div class="leg-item">
              <div
                class="leg-dot"
                style="
                  background: var(--vis-visited);
                  border: 1px solid #93c5fd;
                "
              ></div>
              Visited
            </div>
            <div class="leg-item">
              <div
                class="leg-dot"
                style="
                  background: var(--vis-frontier);
                  border: 1px solid #c4b5fd;
                "
              ></div>
              Frontier
            </div>
            <div class="leg-item">
              <div
                class="leg-dot"
                style="background: var(--vis-path); border: 1px solid #fcd34d"
              ></div>
              Path
            </div>
            <div class="leg-item">
              <div
                class="leg-dot"
                style="background: #22c55e; border-radius: 50%"
              ></div>
              Start
            </div>
            <div class="leg-item">
              <div
                class="leg-dot"
                style="background: #ef4444; border-radius: 50%"
              ></div>
              End
            </div>
          </div>
        </div>
      </div>

      <!-- ── RIGHT PANEL ── -->
      <div class="panel panel-r">
        <div class="sec">
          <div class="sec-title">Statistics</div>
          <div class="stat-card">
            <div class="stat-lbl">Nodes Expanded</div>
            <div class="stat-val" id="s-exp">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-lbl">Path Cost (g)</div>
            <div class="stat-val" id="s-cost">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-lbl">Path Steps</div>
            <div class="stat-val" id="s-len">—</div>
          </div>
          <div class="stat-card" id="s-depth-card" style="display: none">
            <div class="stat-lbl">Current Depth Limit</div>
            <div class="stat-val sm">
              <span id="s-depth" class="depth-badge">0</span>
            </div>
          </div>
        </div>

        <div class="sec">
          <div class="sec-title">Progress</div>
          <div class="pbar-wrap">
            <div class="pbar-bg">
              <div class="pbar-fill" id="pbar" style="width: 0%"></div>
            </div>
            <div class="pbar-lbl" id="pbar-lbl">Step 0 / 0</div>
          </div>
        </div>

        <div class="sep"></div>

        <div
          class="sec"
          style="flex: 1; display: flex; flex-direction: column; min-height: 0"
        >
          <div class="sec-title">Expansion Log</div>
          <div class="log" id="log"></div>
        </div>
      </div>
    </div>

    <script>
      // ═══════════════════════════════════════════════════
      //  STATE
      // ═══════════════════════════════════════════════════
      let M = [],
        m = 0,
        n = 0;
      let sx = 0,
        sy = 0,
        tx = 0,
        ty = 0;
      let w = [0, 1, 2, 3, 4];
      let tcnt = 3;
      let drawMode = "wall";
      let isDown = false;
      let steps = [],
        stepIdx = 0;
      let timer = null,
        running = false;
      let expandedCount = 0;

      const TCOLORS = ["", "#D0EAD4", "#FBF2C0", "#FFE0B2", "#FDDCDC"];
      const TNAMES = ["", "T1 · Grass", "T2 · Sand", "T3 · Rock", "T4 · Swamp"];

      const dx = [-1, 0, 1, 0],
        dy = [0, 1, 0, -1];

      const ALGO_DESC = {
        BFS: "Explores all nodes layer by layer. Guarantees shortest path (by steps) on unweighted graphs.",
        DFS: "Dives deep along one branch before backtracking. Fast but not optimal.",
        UCS: "Expands lowest-cost node first (Dijkstra). Guarantees optimal cost path.",
        DLS: "DFS with a hard depth limit. Useful when solution depth is known.",
        IDS: "Repeatedly runs DLS with increasing depth limits. Optimal + memory-efficient.",
        GBFS: "Greedy: follows heuristic only. Fast but not always optimal.",
        Astar:
          "Combines cost (g) + heuristic (h). Optimal and efficient with admissible h.",
      };

      // ═══════════════════════════════════════════════════
      //  GRID BUILD
      // ═══════════════════════════════════════════════════
      function buildGrid() {
        m = parseInt(document.getElementById("rows").value) || 10;
        n = parseInt(document.getElementById("cols").value) || 12;
        tcnt = parseInt(document.getElementById("tcnt").value) || 2;
        tcnt = Math.max(1, Math.min(4, tcnt));
        M = Array.from({ length: m }, () => new Array(n).fill(1));
        sx = 0;
        sy = 0;
        tx = m - 1;
        ty = n - 1;
        updateTerrainUI();
        updateDrawModes();
        renderGrid();
        clearVis();
      }

      function updateTerrainUI() {
        tcnt = Math.max(
          1,
          Math.min(4, parseInt(document.getElementById("tcnt").value) || 2),
        );
        const c = document.getElementById("terrain-ui");
        c.innerHTML = "";
        for (let i = 1; i <= tcnt; i++) {
          const row = document.createElement("div");
          row.className = "tc-row";
          row.innerHTML = `
      <div class="tc-swatch" style="background:${TCOLORS[i]}"></div>
      <label>T${i}</label>
      <input type="number" value="${w[i] || i}" min="1" max="999"
        style="width:60px;margin:0"
        onchange="w[${i}]=Math.max(1,parseInt(this.value)||1)">
    `;
          c.appendChild(row);
        }
        updateDrawModes();
      }

      function updateDrawModes() {
        const c = document.getElementById("draw-modes");
        c.innerHTML = "";
        const modes = [
          { id: "wall", label: "⬛ Wall" },
          { id: "erase", label: "◻ Erase" },
          { id: "start", label: "🟢 Start" },
          { id: "end", label: "🔴 End" },
        ];
        for (let i = 1; i <= tcnt; i++)
          modes.push({ id: `t${i}`, label: `T${i}`, color: TCOLORS[i] });
        modes.forEach((mo) => {
          const b = document.createElement("div");
          b.className = "dm-btn" + (drawMode === mo.id ? " active" : "");
          b.textContent = mo.label;
          if (mo.color) b.style.borderLeftColor = mo.color;
          b.onclick = () => setMode(mo.id);
          c.appendChild(b);
        });
      }

      function setMode(id) {
        drawMode = id;
        updateDrawModes();
      }

      function renderGrid() {
        const el = document.getElementById("grid");
        const avW = Math.floor((window.innerWidth * 0.5 - 32) / n);
        const avH = Math.floor((window.innerHeight * 0.72 - 32) / m);
        const cs = Math.max(16, Math.min(44, Math.min(avW, avH)));
        el.style.gridTemplateColumns = `repeat(${n},${cs}px)`;
        el.innerHTML = "";
        for (let i = 0; i < m; i++) {
          for (let j = 0; j < n; j++) {
            const d = document.createElement("div");
            d.className = "cell";
            d.style.width = d.style.height = cs + "px";
            d.id = `c_${i}_${j}`;
            d.dataset.x = i;
            d.dataset.y = j;
            d.innerHTML = `<div class="cell-ov"></div><div class="cell-mk"></div>`;
            d.addEventListener("mousedown", (e) => {
              isDown = true;
              paint(i, j);
              e.preventDefault();
            });
            d.addEventListener("mousemove", () => {
              if (isDown) paint(i, j);
            });
            el.appendChild(d);
            paintCell(i, j);
          }
        }
        document.addEventListener("mouseup", () => (isDown = false));
      }

      function paintCell(i, j) {
        const d = document.getElementById(`c_${i}_${j}`);
        if (!d) return;
        d.className = "cell";
        const t = M[i][j];
        if (t === 0) d.classList.add("wall");
        else d.classList.add(`t${t}`);
        const mk = d.querySelector(".cell-mk");
        if (i === sx && j === sy) mk.textContent = "🟢";
        else if (i === tx && j === ty) mk.textContent = "🔴";
        else mk.textContent = "";
      }

      function paint(i, j) {
        if (running) return;
        const old_sx = sx,
          old_sy = sy,
          old_tx = tx,
          old_ty = ty;
        if (drawMode === "wall") {
          if ((i === sx && j === sy) || (i === tx && j === ty)) return;
          M[i][j] = 0;
        } else if (drawMode === "erase") {
          M[i][j] = 1;
        } else if (drawMode === "start") {
          sx = i;
          sy = j;
          if (M[i][j] === 0) M[i][j] = 1;
          paintCell(old_sx, old_sy);
        } else if (drawMode === "end") {
          tx = i;
          ty = j;
          if (M[i][j] === 0) M[i][j] = 1;
          paintCell(old_tx, old_ty);
        } else if (drawMode.startsWith("t")) {
          const t = parseInt(drawMode.slice(1));
          if ((i === sx && j === sy) || (i === tx && j === ty)) return;
          M[i][j] = t;
        }
        paintCell(i, j);
      }

      // ═══════════════════════════════════════════════════
      //  RANDOM MAZE
      // ═══════════════════════════════════════════════════
      function genRandom() {
        clearVis();
        for (let i = 0; i < m; i++) {
          for (let j = 0; j < n; j++) {
            if ((i === sx && j === sy) || (i === tx && j === ty)) continue;
            const r = Math.random();
            if (r < 0.22) M[i][j] = 0;
            else {
              M[i][j] = Math.ceil(Math.random() * tcnt);
            }
          }
        }
        // ensure connectivity from sx,sy: carve a guaranteed path
        let cx = sx,
          cy = sy;
        while (cx !== tx || cy !== ty) {
          if (cx < tx && Math.random() > 0.4) {
            M[cx + 1][cy] = M[cx + 1][cy] || 1;
            cx++;
          } else if (cy < ty && Math.random() > 0.4) {
            M[cx][cy + 1] = M[cx][cy + 1] || 1;
            cy++;
          } else if (cx < tx) {
            M[cx + 1][cy] = M[cx + 1][cy] || 1;
            cx++;
          } else {
            M[cx][cy + 1] = M[cx][cy + 1] || 1;
            cy++;
          }
        }
        renderGrid();
      }

      // ═══════════════════════════════════════════════════
      //  MIN-HEAP
      // ═══════════════════════════════════════════════════
      class Heap {
        constructor(cmp) {
          this.h = [];
          this.cmp = cmp;
        }
        push(x) {
          this.h.push(x);
          this._up(this.h.length - 1);
        }
        pop() {
          const t = this.h[0],
            l = this.h.pop();
          if (this.h.length) {
            this.h[0] = l;
            this._dn(0);
          }
          return t;
        }
        peek() {
          return this.h[0];
        }
        empty() {
          return !this.h.length;
        }
        _up(i) {
          while (i > 0) {
            const p = (i - 1) >> 1;
            if (this.cmp(this.h[i], this.h[p]) < 0) {
              [this.h[i], this.h[p]] = [this.h[p], this.h[i]];
              i = p;
            } else break;
          }
        }
        _dn(i) {
          const n = this.h.length;
          while (1) {
            let s = i,
              l = 2 * i + 1,
              r = 2 * i + 2;
            if (l < n && this.cmp(this.h[l], this.h[s]) < 0) s = l;
            if (r < n && this.cmp(this.h[r], this.h[s]) < 0) s = r;
            if (s !== i) {
              [this.h[i], this.h[s]] = [this.h[s], this.h[i]];
              i = s;
            } else break;
          }
        }
      }

      // ═══════════════════════════════════════════════════
      //  HEURISTIC
      // ═══════════════════════════════════════════════════
      function H(x, y) {
        const ht = parseInt(document.getElementById("htype").value);
        const mul = parseFloat(document.getElementById("hmul").value) || 1;
        const wmin = Math.min(...w.slice(1, tcnt + 1));
        const ddx = Math.abs(x - tx),
          ddy = Math.abs(y - ty);
        if (ht === 1) return Math.sqrt(ddx * ddx + ddy * ddy) * wmin * mul;
        return (ddx + ddy) * wmin * mul;
      }

      function traceP(par) {
        const path = [];
        let cx = tx,
          cy = ty;
        while (!(cx === sx && cy === sy)) {
          path.unshift([cx, cy]);
          [cx, cy] = par[cx][cy];
        }
        path.unshift([sx, sy]);
        return path;
      }

      // ═══════════════════════════════════════════════════
      //  ALGORITHMS  → return steps[]
      // ═══════════════════════════════════════════════════
      function algoBFS() {
        const st = [];
        const vis = A2(false),
          par = A2(null);
        const q = [{ x: sx, y: sy, d: 0, g: 0 }];
        vis[sx][sy] = true;
        par[sx][sy] = [sx, sy];
        while (q.length) {
          const c = q.shift();
          const { x, y } = c;
          st.push({ t: "E", x, y, g: c.g, d: c.d });
          if (x === tx && y === ty) {
            st.push({ t: "F", path: traceP(par), g: c.g });
            return st;
          }
          for (let i = 0; i < 4; i++) {
            const nx = x + dx[i],
              ny = y + dy[i];
            if (ok(nx, ny) && M[nx][ny] && !vis[nx][ny]) {
              vis[nx][ny] = true;
              par[nx][ny] = [x, y];
              q.push({ x: nx, y: ny, d: c.d + 1, g: c.g + w[M[nx][ny]] });
              st.push({ t: "Fr", x: nx, y: ny });
            }
          }
        }
        st.push({ t: "N" });
        return st;
      }

      function algoDFS() {
        const st = [];
        const vis = A2(false),
          par = A2(null);
        const stack = [{ x: sx, y: sy, d: 0, g: 0 }];
        vis[sx][sy] = true;
        par[sx][sy] = [sx, sy];
        while (stack.length) {
          const c = stack.pop();
          const { x, y } = c;
          st.push({ t: "E", x, y, g: c.g, d: c.d });
          if (x === tx && y === ty) {
            st.push({ t: "F", path: traceP(par), g: c.g });
            return st;
          }
          for (let i = 0; i < 4; i++) {
            const nx = x + dx[i],
              ny = y + dy[i];
            if (ok(nx, ny) && M[nx][ny] && !vis[nx][ny]) {
              vis[nx][ny] = true;
              par[nx][ny] = [x, y];
              stack.push({ x: nx, y: ny, d: c.d + 1, g: c.g + w[M[nx][ny]] });
              st.push({ t: "Fr", x: nx, y: ny });
            }
          }
        }
        st.push({ t: "N" });
        return st;
      }

      function algoUCS() {
        const st = [];
        const dis = A2(Infinity),
          par = A2(null);
        const pq = new Heap((a, b) => a.f - b.f);
        dis[sx][sy] = 0;
        par[sx][sy] = [sx, sy];
        pq.push({ x: sx, y: sy, d: 0, g: 0, f: 0 });
        while (!pq.empty()) {
          const c = pq.pop();
          const { x, y } = c;
          if (c.g > dis[x][y]) continue;
          st.push({ t: "E", x, y, g: c.g, d: c.d });
          if (x === tx && y === ty) {
            st.push({ t: "F", path: traceP(par), g: c.g });
            return st;
          }
          for (let i = 0; i < 4; i++) {
            const nx = x + dx[i],
              ny = y + dy[i];
            if (ok(nx, ny) && M[nx][ny]) {
              const ng = c.g + w[M[nx][ny]];
              if (ng < dis[nx][ny]) {
                dis[nx][ny] = ng;
                par[nx][ny] = [x, y];
                pq.push({ x: nx, y: ny, d: c.d + 1, g: ng, f: ng });
                st.push({ t: "Fr", x: nx, y: ny });
              }
            }
          }
        }
        st.push({ t: "N" });
        return st;
      }

      function algoDLS(lim) {
        const st = [];
        const dmin = A2(Infinity),
          par = A2(null);
        let reachedLim = false;
        dmin[sx][sy] = 0;
        par[sx][sy] = [sx, sy];
        const stack = [{ x: sx, y: sy, d: 0, g: 0 }];
        while (stack.length) {
          const c = stack.pop();
          const { x, y } = c;
          if (c.d === lim) reachedLim = true;
          st.push({ t: "E", x, y, g: c.g, d: c.d });
          if (x === tx && y === ty) {
            st.push({ t: "F", path: traceP(par), g: c.g });
            return { st, found: true, reachedLim };
          }
          for (let i = 0; i < 4; i++) {
            const nx = x + dx[i],
              ny = y + dy[i];
            const nd = c.d + 1;
            if (ok(nx, ny) && M[nx][ny] && nd <= lim && nd < dmin[nx][ny]) {
              dmin[nx][ny] = nd;
              par[nx][ny] = [x, y];
              stack.push({ x: nx, y: ny, d: nd, g: c.g + w[M[nx][ny]] });
              st.push({ t: "Fr", x: nx, y: ny });
            }
          }
        }
        st.push({ t: "N" });
        return { st, found: false, reachedLim };
      }

      function algoIDS() {
        const all = [];
        const cap = m * n;
        for (let l = 0; l <= cap; l++) {
          all.push({ t: "I", l });
          const { st, found, reachedLim } = algoDLS(l);
          all.push(...st);
          if (found) return all;
          if (!reachedLim) break;
        }
        if (all[all.length - 1]?.t === "N") all.pop();
        all.push({ t: "N" });
        return all;
      }

      function algoGBFS() {
        const st = [];
        const vis = A2(false),
          par = A2(null);
        const pq = new Heap((a, b) => a.f - b.f);
        vis[sx][sy] = true;
        par[sx][sy] = [sx, sy];
        pq.push({ x: sx, y: sy, d: 0, g: 0, f: H(sx, sy) });
        while (!pq.empty()) {
          const c = pq.pop();
          const { x, y } = c;
          st.push({ t: "E", x, y, g: c.g, d: c.d });
          if (x === tx && y === ty) {
            st.push({ t: "F", path: traceP(par), g: c.g });
            return st;
          }
          for (let i = 0; i < 4; i++) {
            const nx = x + dx[i],
              ny = y + dy[i];
            if (ok(nx, ny) && M[nx][ny] && !vis[nx][ny]) {
              vis[nx][ny] = true;
              par[nx][ny] = [x, y];
              pq.push({
                x: nx,
                y: ny,
                d: c.d + 1,
                g: c.g + w[M[nx][ny]],
                f: H(nx, ny),
              });
              st.push({ t: "Fr", x: nx, y: ny });
            }
          }
        }
        st.push({ t: "N" });
        return st;
      }

      function algoAstar() {
        const st = [];
        const dis = A2(Infinity),
          par = A2(null);
        const pq = new Heap((a, b) => a.f - b.f);
        dis[sx][sy] = 0;
        par[sx][sy] = [sx, sy];
        pq.push({ x: sx, y: sy, d: 0, g: 0, f: H(sx, sy) });
        while (!pq.empty()) {
          const c = pq.pop();
          const { x, y } = c;
          if (c.g > dis[x][y]) continue;
          st.push({ t: "E", x, y, g: c.g, d: c.d });
          if (x === tx && y === ty) {
            st.push({ t: "F", path: traceP(par), g: c.g });
            return st;
          }
          for (let i = 0; i < 4; i++) {
            const nx = x + dx[i],
              ny = y + dy[i];
            if (ok(nx, ny) && M[nx][ny]) {
              const ng = c.g + w[M[nx][ny]];
              if (ng < dis[nx][ny]) {
                dis[nx][ny] = ng;
                par[nx][ny] = [x, y];
                pq.push({ x: nx, y: ny, d: c.d + 1, g: ng, f: ng + H(nx, ny) });
                st.push({ t: "Fr", x: nx, y: ny });
              }
            }
          }
        }
        st.push({ t: "N" });
        return st;
      }

      function genSteps() {
        // refresh terrain costs from UI
        document
          .querySelectorAll("#terrain-ui .tc-row input")
          .forEach((inp, i) => {
            w[i + 1] = Math.max(1, parseInt(inp.value) || 1);
          });
        const a = document.getElementById("algo").value;
        if (a === "BFS") return algoBFS();
        if (a === "DFS") return algoDFS();
        if (a === "UCS") return algoUCS();
        if (a === "DLS")
          return algoDLS(
            parseInt(document.getElementById("dls-lim").value) || 10,
          ).st;
        if (a === "IDS") return algoIDS();
        if (a === "GBFS") return algoGBFS();
        if (a === "Astar") return algoAstar();
      }

      // ═══════════════════════════════════════════════════
      //  VISUALIZATION CONTROLS
      // ═══════════════════════════════════════════════════
      function startRun() {
        clearVis();
        steps = genSteps();
        stepIdx = 0;
        running = true;
        document.getElementById("btn-run").disabled = true;
        document.getElementById("btn-step").disabled = true;
        document.getElementById("btn-pause").disabled = false;
        document.getElementById("s-depth-card").style.display =
          document.getElementById("algo").value === "IDS" ? "block" : "none";
        animate();
      }

      function animate() {
        if (stepIdx >= steps.length) {
          running = false;
          document.getElementById("btn-run").disabled = false;
          document.getElementById("btn-step").disabled = false;
          document.getElementById("btn-pause").disabled = true;
          return;
        }
        doStep(steps[stepIdx++]);
        updatePBar();
        timer = setTimeout(animate, getDelay());
      }

      function getDelay() {
        const s = parseInt(document.getElementById("speed").value);
        return [600, 350, 220, 150, 100, 65, 40, 22, 10, 2][s - 1];
      }

      function stepRun() {
        if (!steps.length) {
          steps = genSteps();
          stepIdx = 0;
          document.getElementById("s-depth-card").style.display =
            document.getElementById("algo").value === "IDS" ? "block" : "none";
        }
        if (stepIdx >= steps.length) return;
        doStep(steps[stepIdx++]);
        updatePBar();
      }

      function pauseRun() {
        if (timer) clearTimeout(timer);
        timer = null;
        running = false;
        const btn = document.getElementById("btn-run");
        btn.textContent = "▶ Resume";
        btn.onclick = resumeRun;
        btn.disabled = false;
        document.getElementById("btn-pause").disabled = true;
      }

      function resumeRun() {
        running = true;
        const btn = document.getElementById("btn-run");
        btn.textContent = "▶ Run";
        btn.onclick = startRun;
        btn.disabled = true;
        document.getElementById("btn-pause").disabled = false;
        animate();
      }

      function doReset() {
        if (timer) clearTimeout(timer);
        timer = null;
        running = false;
        const btn = document.getElementById("btn-run");
        btn.textContent = "▶ Run";
        btn.onclick = startRun;
        clearVis();
        renderGrid();
      }

      function clearVis() {
        if (timer) clearTimeout(timer);
        timer = null;
        running = false;
        steps = [];
        stepIdx = 0;
        expandedCount = 0;
        document.querySelectorAll(".cell").forEach((c) => {
          c.classList.remove("vis", "front", "onpath", "popping", "pathpop");
          c.querySelector(".cell-ov").style.background = "";
        });
        document.getElementById("log").innerHTML = "";
        document.getElementById("s-exp").textContent = "—";
        document.getElementById("s-cost").textContent = "—";
        document.getElementById("s-len").textContent = "—";
        document.getElementById("pbar").style.width = "0%";
        document.getElementById("pbar-lbl").textContent = "Step 0 / 0";
        document.getElementById("btn-run").disabled = false;
        document.getElementById("btn-step").disabled = false;
        document.getElementById("btn-pause").disabled = true;
      }

      function clearAll() {
        clearVis();
        M = Array.from({ length: m }, () => new Array(n).fill(1));
        renderGrid();
      }

      // ═══════════════════════════════════════════════════
      //  STEP PROCESSOR
      // ═══════════════════════════════════════════════════
      function doStep(step) {
        if (step.t === "E") {
          expandedCount++;
          const c = cell(step.x, step.y);
          if (c) {
            c.classList.remove("front");
            c.classList.add("vis", "popping");
            setTimeout(() => c.classList.remove("popping"), 350);
          }
          document.getElementById("s-exp").textContent = expandedCount;
          addLog("expand", `▸ (${step.x},${step.y})  g=${step.g}  d=${step.d}`);
        } else if (step.t === "Fr") {
          const c = cell(step.x, step.y);
          if (c && !c.classList.contains("vis")) c.classList.add("front");
        } else if (step.t === "F") {
          step.path.forEach(([x, y], idx) => {
            setTimeout(() => {
              const c = cell(x, y);
              if (!c) return;
              c.classList.remove("front", "vis", "popping");
              c.classList.add("onpath", "pathpop");
              setTimeout(() => c.classList.remove("pathpop"), 280);
            }, idx * 38);
          });
          document.getElementById("s-cost").textContent = step.g;
          document.getElementById("s-len").textContent = step.path.length - 1;
          addLog(
            "found",
            `✓ Path found! Cost=${step.g}  Steps=${step.path.length - 1}`,
          );
        } else if (step.t === "N") {
          addLog("nofound", "✗ No path found");
        } else if (step.t === "I") {
          document.getElementById("s-depth").textContent = step.l;
          addLog("info", `── IDS: depth limit = ${step.l}`);
        }
      }

      function addLog(cls, msg) {
        const log = document.getElementById("log");
        const e = document.createElement("div");
        e.className = `le ${cls}`;
        e.textContent = msg;
        log.appendChild(e);
        log.scrollTop = log.scrollHeight;
      }

      function updatePBar() {
        const p = steps.length ? (stepIdx / steps.length) * 100 : 0;
        document.getElementById("pbar").style.width = p + "%";
        document.getElementById("pbar-lbl").textContent =
          `Step ${stepIdx} / ${steps.length}`;
      }

      // ═══════════════════════════════════════════════════
      //  UI HELPERS
      // ═══════════════════════════════════════════════════
      function onAlgoChange() {
        const a = document.getElementById("algo").value;
        document.getElementById("dls-p").style.display =
          a === "DLS" ? "block" : "none";
        document.getElementById("h-p").style.display =
          a === "GBFS" || a === "Astar" ? "block" : "none";
        document.getElementById("algo-desc").textContent = ALGO_DESC[a] || "";
        // update header pill
        document.querySelectorAll(".pill").forEach((p) => {
          p.classList.toggle("active-algo", p.dataset.a === a);
        });
      }

      function cell(x, y) {
        return document.getElementById(`c_${x}_${y}`);
      }
      function ok(x, y) {
        return x >= 0 && y >= 0 && x < m && y < n;
      }
      function A2(v) {
        return Array.from({ length: m }, () => new Array(n).fill(v));
      }

      // ═══════════════════════════════════════════════════
      //  INIT
      // ═══════════════════════════════════════════════════
      buildGrid();
      onAlgoChange();
      // draw a small default demo pattern
      (function demo() {
        // a few walls in the middle
        const mid = Math.floor(m / 2);
        for (let j = 2; j < n - 2; j++)
          if (j !== Math.floor(n / 2)) M[mid][j] = 0;
        // some terrain variety
        for (let i = 0; i < m; i++)
          for (let j = 0; j < n; j++) {
            if (
              M[i][j] !== 0 &&
              !((i === sx && j === sy) || (i === tx && j === ty))
            ) {
              if (i > m / 2)
                M[i][j] = Math.ceil(Math.random() * Math.min(tcnt, 2));
            }
          }
        renderGrid();
      })();
    </script>
  </body>
</html>
